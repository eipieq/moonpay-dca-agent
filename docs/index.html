<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>proof of agent</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 40px 20px;
    }

    .container { max-width: 780px; margin: 0 auto; }

    header { margin-bottom: 48px; }

    header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.5px;
    }

    header p {
      color: #666;
      margin-top: 8px;
      font-size: 12px;
    }

    header p a { color: #555; text-decoration: none; }
    header p a:hover { color: #999; }

    .meta {
      display: flex;
      gap: 24px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .meta-item { color: #444; font-size: 11px; }
    .meta-item span { color: #888; }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
      color: #555;
      font-size: 11px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
    }

    .dot.green { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .dot.loading { background: #f59e0b; animation: pulse 1s infinite; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .sessions { display: flex; flex-direction: column; gap: 24px; }

    .session {
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      overflow: hidden;
    }

    .session-header {
      background: #111;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1a1a1a;
    }

    .session-number { color: #fff; font-weight: 600; font-size: 12px; }
    .session-time { color: #444; font-size: 11px; }

    .steps { padding: 0; }

    .step {
      padding: 14px 16px;
      border-bottom: 1px solid #111;
      display: grid;
      grid-template-columns: 100px 1fr auto;
      gap: 12px;
      align-items: start;
    }

    .step:last-child { border-bottom: none; }

    .step-name {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      text-align: center;
      white-space: nowrap;
    }

    .step-name.market_data { background: #1a2a1a; color: #4ade80; }
    .step-name.decision    { background: #1a1a2a; color: #818cf8; }
    .step-name.execution   { background: #2a1a1a; color: #f87171; }

    .step-hash {
      color: #555;
      font-size: 11px;
      word-break: break-all;
    }

    .step-hash .label { color: #333; margin-right: 6px; }

    .verified {
      font-size: 10px;
      color: #22c55e;
      white-space: nowrap;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #333;
    }

    .error {
      background: #1a0a0a;
      border: 1px solid #2a1010;
      border-radius: 8px;
      padding: 16px;
      color: #f87171;
      font-size: 12px;
    }

    footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid #1a1a1a;
      color: #333;
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    footer a { color: #444; text-decoration: none; }
    footer a:hover { color: #888; }

    button {
      background: #111;
      border: 1px solid #222;
      color: #666;
      font-family: inherit;
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }

    button:hover { border-color: #444; color: #aaa; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>proof of agent</h1>
      <p>
        every AI decision committed onchain — tamper-proof, permanent, free. &nbsp;·&nbsp;
        <a href="https://github.com/eipieq/moonpay-dca-agent" target="_blank">github</a>
      </p>
      <div class="meta">
        <div class="meta-item">contract <span id="contract">0xF1DD974...2Fc1e</span></div>
        <div class="meta-item">network <span>Status Network Sepolia</span></div>
        <div class="meta-item">gas price <span>0</span></div>
        <div class="meta-item">sessions <span id="session-count">—</span></div>
      </div>
    </header>

    <div class="status-bar">
      <div class="dot loading" id="dot"></div>
      <span id="status-text">connecting to Status Network...</span>
      <button onclick="load()" style="margin-left: auto">refresh</button>
    </div>

    <div id="output"></div>

    <footer>
      <span>built with MoonPay CLI + OpenWallet Standard + Status Network</span>
      <span>
        <a href="https://github.com/eipieq/moonpay-dca-agent" target="_blank">source</a>
        &nbsp;·&nbsp;
        <a href="https://public.sepolia.rpc.status.network" target="_blank">rpc</a>
      </span>
    </footer>
  </div>

  <script>
    const RPC = "https://public.sepolia.rpc.status.network";
    const ADDRESS = "0xF1DD974deD8ECF432AF9A0abb10584dE92d2Fc1e";
    const ABI = [
      "function getLogs() external view returns (tuple(bytes32 outputHash, string prompt, address agent, uint256 timestamp)[])"
    ];

    function shortHash(h) {
      return h.slice(0, 10) + "..." + h.slice(-8);
    }

    function setStatus(text, state) {
      document.getElementById("status-text").textContent = text;
      const dot = document.getElementById("dot");
      dot.className = "dot " + (state || "");
    }

    async function load() {
      setStatus("connecting to Status Network...", "loading");
      document.getElementById("output").innerHTML = "";

      try {
        const provider = new ethers.JsonRpcProvider(RPC);
        const contract = new ethers.Contract(ADDRESS, ABI, provider);
        const raw = await contract.getLogs();

        const entries = raw.filter(e => e.prompt.startsWith("proof-of-agent:"));

        setStatus(`${raw.length} total entries · ${entries.length} proof-of-agent steps`, "green");
        document.getElementById("session-count").textContent = Math.floor(entries.length / 3);

        if (entries.length === 0) {
          document.getElementById("output").innerHTML = `<div class="empty">no proof-of-agent sessions yet</div>`;
          return;
        }

        // group into sessions of 3
        const sessions = [];
        for (let i = 0; i < entries.length; i += 3) {
          sessions.push(entries.slice(i, i + 3));
        }

        const html = sessions.map((steps, i) => {
          const first = steps[0];
          const time = new Date(Number(first.timestamp) * 1000).toLocaleString();

          const stepsHtml = steps.map(s => {
            const name = s.prompt.replace("proof-of-agent:", "");
            return `
              <div class="step">
                <div class="step-name ${name}">${name}</div>
                <div class="step-hash">
                  <span class="label">hash</span>${shortHash(s.outputHash)}<br>
                  <span class="label">agent</span>${shortHash(s.agent)}
                </div>
                <div class="verified">✓ onchain</div>
              </div>`;
          }).join("");

          return `
            <div class="session">
              <div class="session-header">
                <span class="session-number">session ${i + 1}</span>
                <span class="session-time">${time}</span>
              </div>
              <div class="steps">${stepsHtml}</div>
            </div>`;
        }).reverse().join("");

        document.getElementById("output").innerHTML = `<div class="sessions">${html}</div>`;

      } catch (e) {
        setStatus("connection failed", "");
        document.getElementById("output").innerHTML = `<div class="error">error: ${e.message}</div>`;
      }
    }

    load();
  </script>
</body>
</html>
